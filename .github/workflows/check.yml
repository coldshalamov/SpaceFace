# Continuous integration for SpaceFace.
#
# Runs the PR-safe portion of the project's check suite on every push and pull request. The
# `check:ci` alias now includes several default-route browser probes (first-15, station flow,
# mission handoff/map, automation board, market loop, etc.) because those checks protect shipped
# player trust surfaces. CI therefore installs the Playwright probe runtime explicitly instead of
# relying on a developer machine, a Codex runtime cache, or a global browser install.
#
# A green run here means every namespaced data ref resolves, the fixed-timestep sim is
# deterministic across save/reload, the default browser route can exercise the critical onboarding
# and station/economy probes, and no wired gameplay contract has regressed.
name: check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel a superseded in-flight run on the same ref (push-then-PR, or force-push).
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 LTS. The headless/gameplay scripts use Node built-ins + vendored three.module.js;
          # the bundle check additionally needs esbuild, so root dependencies are installed first.
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.60.0

      - name: Install Playwright browser probe runtime
        run: |
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install --no-save --no-package-lock playwright@1.60.0
          npx playwright install --with-deps chromium

      - name: Run CI check suite (+ default-route browser probes)
        run: npm run check:ci
