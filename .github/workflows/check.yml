# Continuous integration for SpaceFace.
#
# Runs the CI-safe portion of the project's check suite on every push and pull request. The
# `check:ci` alias includes headless browser probes that boot the normal player route through
# Playwright, so CI installs the declared Playwright dependency plus its Chromium browser before
# running checks.
#
# A green run here means every namespaced data ref resolves, the fixed-timestep sim is
# deterministic across save/reload, and no wired gameplay contract has regressed.
name: check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel a superseded in-flight run on the same ref (push-then-PR, or force-push).
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 LTS. The headless check scripts use Node built-ins + vendored three.module.js;
          # the bundle check (check:bundle) additionally needs esbuild, so deps ARE installed now.
          node-version: '20'
          cache: 'npm'

      # Install dev dependencies. npm ci is faster + deterministic on CI.
      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run headless check suite (+ bundle verification)
        run: npm run check:ci
